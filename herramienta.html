<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Textos y Colores Hex</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 15px;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .actions {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        #copyBtn {
            background-color: #27ae60;
            display: none;
        }
        #copyBtn:hover {
            background-color: #219150;
        }
        .note {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Organizador de Colores Hex</h1>
    <p style="text-align: center;">Pega tu texto desordenado a la izquierda y obtén un formato limpio a la derecha.</p>

    <div class="container">
        <!-- Entrada -->
        <div class="box">
            <label for="inputText">Texto Original (Pegar aquí):</label>
            <textarea id="inputText" placeholder="Ejemplo:
Base color
e7d4ff
af9dc6
Front body..."></textarea>
            <div class="note">El script detectará automáticamente etiquetas y códigos hex de 6 dígitos.</div>
        </div>
        <div class="box">
            <label for="outputText">Resultado Formateado:</label>
            <textarea id="outputText" readonly placeholder="El resultado aparecerá aquí..."></textarea>
        </div>
    </div>

    <div class="actions">
        <button id="processBtn" onclick="procesarTexto()">🚀 Organizar Texto</button>
        <button id="copyBtn" onclick="copiarResultado()">📋 Copiar Resultado</button>
    </div>

    <script>
        function procesarTexto() {
            const input = document.getElementById('inputText').value;
            const outputArea = document.getElementById('outputText');
            const copyBtn = document.getElementById('copyBtn');
            
            if (!input.trim()) {
                alert("Por favor, pega algún texto primero.");
                return;
            }
            const lineas = input.split('\n')
                .map(linea => linea.trim())
                .filter(linea => linea !== '');líneas vacías

            let resultado = [];
            let i = 0;
            const totalLineas = lineas.length;
            const regexHex = /^[0-9a-fA-F]{6}$/;

            while (i < totalLineas) {
                const lineaActual = lineas[i];
                if (regexHex.test(lineaActual)) {
                    i++;
                    continue;
                }
                const etiqueta = lineaActual;
                let colores = [];
                i++;
                while (i < totalLineas) {
                    const siguiente = lineas[i];
                    if (regexHex.test(siguiente)) {
                        colores.push(siguiente.toLowerCase());
                        i++;
                    } else {
                        break;
                    }
                }
                if (colores.length > 0) {
                    const coloresStr = colores.join('-');
                    resultado.push(`${etiqueta}: ${coloresStr}`);
                } else {
                    resultado.push(etiqueta);
                }
            }
            outputArea.value = resultado.join('\n');
            copyBtn.style.display = 'block';
        }

        function copiarResultado() {
            const outputText = document.getElementById('outputText');
            outputText.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copyBtn');
            const textoOriginal = btn.innerText;
            btn.innerText = '¡Copiado!';
            setTimeout(() => {
                btn.innerText = textoOriginal;
            }, 2000);
        }
    </script>
</body>
</html>
